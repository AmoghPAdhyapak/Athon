openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: captions
    description: Caption generation operations
  - name: saved
    description: Saved captions operations
  - name: analyze
    description: Gemini Vision image analysis and creator asset generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /captions/generate:
    post:
      operationId: generateCaptions
      tags: [captions]
      summary: Generate captions, titles, and hashtags using Gemini AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerationInput"
      responses:
        "200":
          description: Generated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerationResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /analyze/generate-thumbnail:
    post:
      operationId: analyzeThumbnail
      tags: [analyze]
      summary: Analyze an image and generate creator assets via Gemini Vision (SSE stream)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeInput"
      responses:
        "200":
          description: SSE stream of analysis events
          content:
            text/event-stream: {}
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /analyze/generated-images:
    get:
      operationId: listGeneratedImages
      tags: [analyze]
      summary: List all saved AI-generated thumbnail images (thumbnails only, no full b64)
      responses:
        "200":
          description: List of saved generated images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedGeneratedImage"

  /analyze/generated-images/{id}:
    get:
      operationId: getGeneratedImage
      tags: [analyze]
      summary: Get a single generated image with full base64 data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full generated image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedImageResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteGeneratedImage
      tags: [analyze]
      summary: Delete a saved generated image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /analyze/generate-image:
    post:
      operationId: generateThumbnailImage
      tags: [analyze]
      summary: Generate an AI-edited thumbnail image using Gemini Vision + image generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeInput"
      responses:
        "200":
          description: Generated image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedImageResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /captions/generate-stream:
    post:
      operationId: generateCaptionsStream
      tags: [captions]
      summary: Stream caption generation results via SSE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerationInput"
      responses:
        "200":
          description: SSE stream of generation events
          content:
            text/event-stream: {}

  /captions/saved:
    get:
      operationId: listSavedCaptions
      tags: [saved]
      summary: List all saved captions
      responses:
        "200":
          description: List of saved captions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedCaption"
    post:
      operationId: saveCaption
      tags: [saved]
      summary: Save a caption
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedCaptionInput"
      responses:
        "201":
          description: Saved caption
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedCaption"

  /captions/saved/{id}:
    delete:
      operationId: deleteSavedCaption
      tags: [saved]
      summary: Delete a saved caption
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /captions/history:
    get:
      operationId: listHistory
      tags: [captions]
      summary: List recent generation history
      responses:
        "200":
          description: List of recent generations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEntry"

  /captions/stats:
    get:
      operationId: getStats
      tags: [captions]
      summary: Get usage statistics
      responses:
        "200":
          description: Usage stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /analyze/scene-decoder:
    post:
      operationId: decodeScene
      tags: [analyze]
      summary: AI cinematic scene decode of an uploaded image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SceneDecodeInput"
      responses:
        "200":
          description: Cinematic scene decode result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SceneDecodeResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GenerationInput:
      type: object
      properties:
        category:
          type: string
          description: "Category: Gaming, Anime, Attitude, Motivation, Sad, Funny, Romantic, Free Fire, Cinematic, YouTube"
        topic:
          type: string
          description: Topic or subject for the captions
        type:
          type: string
          description: "Type: captions, titles, hashtags, bio, all"
        platform:
          type: string
          description: "Optional target platform for platform-aware generation: Instagram, YouTube, TikTok, Facebook"
        subtype:
          type: string
          description: "Optional platform content subtype (e.g. Reel, Story, Post, Carousel, Shorts, Long Video, Community Post, Viral Clip, Story Style, Trend Hook)"
        style:
          type: string
          description: "Optional creator style layer (e.g. Cinematic, Aesthetic, Dark, Viral, Sigma, Glow, Luxury). Used for context-aware Instagram generation."
        intent:
          type: string
          description: "Optional engagement intent layer (e.g. Engagement, Motivation, Emotional, Meme, Promotion, Trend). Used for context-aware Instagram generation."
        instagramCategory:
          type: string
          description: "Optional Instagram creator category that adapts to the chosen subtype (e.g. Viral Reel, Trending Audio, Hook Caption, Story Caption, Mood Quote, Feed Caption, Carousel Caption, Personal Branding). Used for context-aware Instagram generation."
      required:
        - category
        - topic
        - type

    SceneDecodeInput:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image data (no data URI prefix)
        mimeType:
          type: string
          description: Image MIME type (e.g. image/jpeg)
      required:
        - imageBase64

    SceneDecodeResult:
      type: object
      properties:
        sceneDescription:
          type: string
        cinematicBreakdown:
          type: string
        moodAnalysis:
          type: string
        compositionAnalysis:
          type: string
        lightingAnalysis:
          type: string
        creatorReadyPrompt:
          type: string
        emotionalTone:
          type: string
        captionSuggestions:
          type: array
          items:
            type: string
      required:
        - sceneDescription
        - cinematicBreakdown
        - moodAnalysis
        - compositionAnalysis
        - lightingAnalysis
        - creatorReadyPrompt
        - emotionalTone
        - captionSuggestions

    GenerationResult:
      type: object
      properties:
        captions:
          type: array
          items:
            type: string
        titles:
          type: array
          items:
            type: string
        hashtags:
          type: array
          items:
            type: string
        bio:
          type: ["string", "null"]
        category:
          type: string
        topic:
          type: string
        generatedAt:
          type: string
          format: date-time
      required:
        - captions
        - titles
        - hashtags
        - category
        - topic
        - generatedAt

    SavedCaptionInput:
      type: object
      properties:
        text:
          type: string
        category:
          type: string
        type:
          type: string
          description: "caption, title, hashtag, bio"
      required:
        - text
        - category
        - type

    SavedCaption:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        category:
          type: string
        type:
          type: string
        savedAt:
          type: string
          format: date-time
      required:
        - id
        - text
        - category
        - type
        - savedAt

    HistoryEntry:
      type: object
      properties:
        id:
          type: integer
        category:
          type: string
        topic:
          type: string
        type:
          type: string
        generatedAt:
          type: string
          format: date-time
        resultSnapshot:
          type: string
          description: JSON snapshot of the result
      required:
        - id
        - category
        - topic
        - type
        - generatedAt
        - resultSnapshot

    Stats:
      type: object
      properties:
        totalGenerations:
          type: integer
        totalSaved:
          type: integer
        topCategory:
          type: ["string", "null"]
        categoryCounts:
          type: object
          additionalProperties:
            type: integer
      required:
        - totalGenerations
        - totalSaved
        - categoryCounts

    AnalyzeInput:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image data (without data URI prefix)
        mimeType:
          type: string
          description: "Image MIME type: image/jpeg, image/png, image/webp"
        platform:
          type: string
          description: "Target platform: YouTube, YouTube Shorts, Instagram, Reels, TikTok, Facebook, X/Twitter"
        mood:
          type: string
          description: "Mood: Rage, Revenge, Dark, Emotional, Heroic, Funny, Clutch, Aggressive, Cinematic"
        style:
          type: string
          description: "Style: Anime Aura, Esports, Cinematic, Neon, Fire, Dark Mode, Hyper-realistic, Action Movie"
        situation:
          type: string
          description: User description of the scene or situation / hook angle
        game:
          type: string
          description: Game or content context
        extraPrompt:
          type: string
          description: Additional custom prompt instructions for image generation
        aspectRatio:
          type: string
          description: "User-selected output aspect ratio, e.g. 16:9, 9:16, 1:1, 4:5, 21:9, 2:3"
      required:
        - imageBase64
        - mimeType
        - platform
        - mood
        - style
        - situation
        - game

    GeneratedImageResult:
      type: object
      properties:
        id:
          type: integer
          description: Saved image record ID
        b64_json:
          type: string
          description: Base64-encoded generated image
        mimeType:
          type: string
          description: Image MIME type
      required:
        - id
        - b64_json
        - mimeType

    SavedGeneratedImage:
      type: object
      properties:
        id:
          type: integer
        mimeType:
          type: string
        platform:
          type: string
        mood:
          type: string
        style:
          type: string
        game:
          type: ["string", "null"]
        situation:
          type: ["string", "null"]
        extraPrompt:
          type: ["string", "null"]
        createdAt:
          type: string
        thumbnailB64:
          type: string
          description: Small base64 preview for gallery display
      required:
        - id
        - mimeType
        - platform
        - mood
        - style
        - createdAt
        - thumbnailB64

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
