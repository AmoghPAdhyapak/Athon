kind = "web"
previewPath = "/"
title = "AI Caption Generator"
version = "1.0.0"
id = "artifacts/caption-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20808

[services.development]
run = "pnpm --filter @workspace/caption-generator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/caption-generator", "run", "build" ]
publicDir = "artifacts/caption-generator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20808"
BASE_PATH = "/"
